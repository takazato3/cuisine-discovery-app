<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗一覧 - 世界の料理を探そう</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header detail-header">
    <div class="header-inner">
      <a href="index.html" class="back-btn" id="back-btn">← 戻る</a>
      <div class="detail-header-title">
        <h1 class="site-title detail-title" id="cuisine-heading">料理ジャンル</h1>
        <p class="cuisine-representative-menu" id="cuisine-menu-label"></p>
        <p class="site-subtitle"><span id="region-label">東京</span>の店舗一覧</p>
      </div>
    </div>
  </header>

  <main class="main-content detail-main">

    <!-- Map Section -->
    <section class="map-section">
      <div class="map-container" id="map-container">
        <div class="map-placeholder" id="map-placeholder">
          <span class="map-placeholder-icon">🗺️</span>
          <span>地図を読み込んでいます...</span>
        </div>
      </div>
      <p class="map-note" id="map-note">※ 検索結果1店舗目の位置です</p>
    </section>

    <!-- Restaurant List -->
    <section class="restaurant-section">
      <div class="section-header">
        <h2 class="section-title">近くのお店</h2>
        <span class="section-count" id="restaurant-count"></span>
      </div>
      <div class="api-error" id="api-error" hidden>
        ⚠️ 店舗情報の取得に失敗しました。ダミーデータを表示しています。
      </div>
      <div class="sort-info" id="sort-info" hidden>評価の高い順に表示しています</div>
      <div class="restaurant-list" id="restaurant-list">
        <!-- Rendered by detail.js -->
      </div>
      <div class="pagination" id="pagination" hidden>
        <!-- Rendered by detail.js -->
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p class="update-info">データ更新日: <span id="last-updated">—</span>（週1回更新）</p>
  </footer>

  <script src="detail.js"></script>
</body>
</html>
