name: Investigate Places API Query Behavior

on:
  # 手動実行のみ
  workflow_dispatch:

permissions:
  contents: write

jobs:
  investigate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: claude/investigate-places-api-snkuH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run query investigation
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: node test-queries.js | tee query-test-results.txt

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add query-test-results.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore: save query investigation results [${DATE}]"
            git push origin claude/investigate-places-api-snkuH
          fi
